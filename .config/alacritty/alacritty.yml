TERM: xterm-256-color
window:
  dimensions:
    columns: 80
    lines: 30

  padding:
    x: 5 
    y: 5

  opacity: 0.9
  
  dynamic_padding: false

  decorations: full

font: 
  normal:  
    family: Mononoki Nerd Font 
    style: Regular
  
  bold:  
    family: Mononoki Nerd Font 
    style: Regular

  size: 16.0

colors:
  # Default colors
  primary:
    background: '0x171717'
    foreground: '0xf8f8f8'

  # Normal colors
  normal:
    black:   '0x171717'
    red:     '0xd81765'
    green:   '0x97d01a'
    yellow:  '0xffa800'
    blue:    '0x16b1fb'
    magenta: '0xff2491'
    cyan:    '0x0fdcb6'
    white:   '0xebebeb'

  # Bright colors
  bright:
    black:   '0x38252c'
    red:     '0xff0000'
    green:   '0x76b639'
    yellow:  '0xe1a126'
    blue:    '0x289cd5'
    magenta: '0xff2491'
    cyan:    '0x0a9b81'
    white:   '0xf8f8f8'
