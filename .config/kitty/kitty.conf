# Terminal font
font_family mononoki Nerd Font Mono
bold_font auto
font_size 16

# Cursor settings
cursor_shape underline

# Mouse settings
detect_urls yes

# Color scheme
background_opacity 0.8

# black
color0 #171717
color8 #38252c

# red
color1 #d81765
color9 #ff0000 

# green
color2 #97d01a
color10 #76b639

# yellow
color3 #ffa800
color11 #e1a126

# blue
color4 #16b1fb
color12 #289cd5

# magenta
color5 #ff2491
color13 #ff2491 

# cyan
color6 #0fdcb6
color14 #0a9b81

# white
color7 #ebebeb
color15 #f8f8f8

# terminal settings
term xterm-kitty
enable_audio_bell no
